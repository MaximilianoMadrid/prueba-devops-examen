server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${MS_AUTH_URI:http://ms-auth:8081}
          predicates:
            - Path=/api/auth/**

        - id: orders-service
          uri: ${MS_ORDERS_URI:http://ms-orders:8082}
          predicates:
            - Path=/api/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always